<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Two</title>
</head>
<body>
    <h1>Puppy Adoption Page</h1>
    <h3>Please enter your information to adopt a puppy and we'll email you back.</h3>
    <form method="GET">
        <p> Please Note: First Name, Last Name, Password, and Email are required</p>
        
        <label for="first_name">First Name:</label>
        <input type="text" id="first_name" name="first_name" placeholder="First Name" required>
        
        <label for="last_name">Last Name:</label>
        <input type="text" id="last_name" name="last_name" placeholder="Last Name" required>

        <br>
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="name@email.com" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>

        <br>

        <p> Are you over the age of 18?</p>
        <label for="yes_option">Yes:</label>
        <input type="radio" name="age" id="yes_option" value="yes">
        
        <label for="no_option">No:</label>
        <input type="radio" name="age" id="no_option" value="no">
        
        <br>

        <p>Do you have a Credit Card or PayPal?</p>
        <select name="payment_method" id="payment_method">
            <option value="credit_card">Credit Card</option>
            <option value="paypal">PayPal</option>
        </select>

        <br>
        <br>

        <input type="submit" value="Submit Feedback">
    </form>
    
</body>
</html>
